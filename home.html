<!DOCTYPE html>
<html>
<head>
<title>Medical Insurance Price Prediction</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* Background */

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(135deg,rgba(238,242,247,0.85),rgba(217,228,245,0.85)),
url("/static/m1.jpg");

background-size:cover;
background-position:center;

overflow:hidden;

}

/* Floating particles */

.particles{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;

}

.particles span{

position:absolute;

width:10px;
height:10px;

background:white;

border-radius:50%;

opacity:0.5;

animation:floatParticle 18s linear infinite;

}

.particles span:nth-child(1){left:10%;}
.particles span:nth-child(2){left:25%;}
.particles span:nth-child(3){left:40%;}
.particles span:nth-child(4){left:60%;}
.particles span:nth-child(5){left:75%;}
.particles span:nth-child(6){left:90%;}

@keyframes floatParticle{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:0.7;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

/* DNA animation */

.dna{

position:absolute;

width:100%;
height:100%;

background:
repeating-linear-gradient(
90deg,
transparent,
transparent 40px,
rgba(74,144,226,0.15) 40px,
rgba(74,144,226,0.15) 42px
);

animation:dnaMove 15s linear infinite;

}

@keyframes dnaMove{

0%{
background-position:0 0;
}

100%{
background-position:200px 200px;
}

}

/* Glass container */

.container{

position:relative;
z-index:2;

text-align:center;

background:rgba(255,255,255,0.75);

backdrop-filter:blur(10px);

padding:45px;

border-radius:18px;

border:1px solid rgba(255,255,255,0.5);

box-shadow:
0 0 25px rgba(74,144,226,0.4),
0 0 60px rgba(74,144,226,0.2);

width:420px;

animation:floatBox 3s ease-in-out infinite alternate;

}

/* Floating card */

@keyframes floatBox{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-10px);
}

}

/* Medical cross icon */

.medical-icon{

font-size:55px;

color:#1e88e5;

margin-bottom:10px;

animation:crossGlow 2s infinite alternate;

}

@keyframes crossGlow{

0%{
transform:scale(1);
text-shadow:0 0 10px rgba(30,136,229,0.4);
}

100%{
transform:scale(1.2);
text-shadow:0 0 20px rgba(30,136,229,0.9);
}

}

/* Title */

h1{

color:#0b3c5d;

margin-bottom:10px;

}

/* Subtitle */

h3{

color:#4a90e2;

margin-bottom:30px;

}

.heartbeat{

width:200px;
margin:20px auto;

}

.heartbeat svg{

width:100%;
height:60px;

}

.heartbeat polyline{

fill:none;

stroke:#FF0000;

stroke-width:4;

stroke-dasharray:500;

stroke-dashoffset:500;

animation:heartMove 2s linear infinite;

}

@keyframes heartMove{

0%{
stroke-dashoffset:500;
}

100%{
stroke-dashoffset:0;
}

}
/* Buttons */

button{

position:relative;
overflow:hidden;

padding:12px 26px;

margin:10px;

font-size:16px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

color:white;

}

/* Button gradients */

.login-btn{

background:linear-gradient(45deg,#4a90e2,#3d7eff);

}

.register-btn{

background:linear-gradient(45deg,#2ecc71,#27ae60);

}

/* Shine hover */

button::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.6),
transparent
);

transition:0.6s;

}

button:hover::before{

left:100%;

}

button:hover{

transform:scale(1.08);

box-shadow:0 10px 20px rgba(0,0,0,0.3);

}
</style>
</head>
<body>

<div class="particles">
<span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<div class="dna"></div>

<div class="container">

<div class="medical-icon">+</div>

<h1>Medical Insurance Price Prediction</h1>

<div class="heartbeat">
  <svg viewBox="0 0 500 100">
    <polyline 
      points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"
      />
  </svg>
</div>

<h3>Machine Learning Project</h3>

<a href="{{ url_for('login') }}">
<button class="login-btn">Login</button>
</a>

<a href="{{ url_for('register') }}">
<button class="register-btn">Register</button>
</a>

</div>

</body>
</html>
