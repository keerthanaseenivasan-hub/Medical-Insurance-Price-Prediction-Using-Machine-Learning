<!DOCTYPE html>
<html>
<head>
<title>User Login</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* Background */

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(18, 104, 196, 0.5),rgba(18, 104, 196, 0.5)),
url("/static/m2.jpg");

background-size:cover;
background-position:center;

overflow:hidden;

}

/* Floating particles */

.particles{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;

}

.particles span{

position:absolute;

width:8px;
height:8px;

background:white;

border-radius:50%;

opacity:0.6;

animation:floatParticle 18s linear infinite;

}

.particles span:nth-child(1){left:10%;}
.particles span:nth-child(2){left:30%;}
.particles span:nth-child(3){left:50%;}
.particles span:nth-child(4){left:70%;}
.particles span:nth-child(5){left:90%;}

@keyframes floatParticle{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:0.7;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

/* Glass card */

.container{

position:relative;
z-index:2;

width:340px;
padding:40px;
text-align:center;

border-radius:15px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.4);

box-shadow:
0 0 20px rgba(74,144,226,0.6),
0 0 40px rgba(74,144,226,0.3);

animation:floatBox 4s ease-in-out infinite alternate;

}

@keyframes floatBox{

from{transform:translateY(0);}
to{transform:translateY(-10px);}

}

/* Medical icon */

.medical-icon{

font-size:45px;
color:#4a90e2;

margin-bottom:10px;

animation:crossGlow 2s infinite alternate;

}

@keyframes crossGlow{

from{
transform:scale(1);
text-shadow:0 0 10px #4a90e2;
}

to{
transform:scale(1.2);
text-shadow:0 0 25px #4a90e2;
}

}

/* Title */

h2{
color:white;
margin-bottom:10px;
}

/* ECG heartbeat */

.heartbeat{

width:180px;
margin:10px auto 20px;

}

.heartbeat svg{

width:100%;
height:50px;

}

.heartbeat polyline{

fill:none;
stroke:#FF0000;
stroke-width:4;

stroke-dasharray:400;
stroke-dashoffset:400;

animation:heartMove 2s linear infinite;

}

@keyframes heartMove{

0%{stroke-dashoffset:400;}
100%{stroke-dashoffset:0;}

}

/* Inputs */

input{

width:100%;
padding:12px;
margin:12px 0;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.9);

outline:none;

transition:0.3s;

}

input:focus{

transform:scale(1.03);

box-shadow:0 0 10px #4a90e2;

}

/* Button */

button{

position:relative;
overflow:hidden;

width:100%;
padding:12px;

border:none;
border-radius:8px;

font-size:16px;
font-weight:bold;

cursor:pointer;

background:linear-gradient(45deg,#4a90e2,#007bff);

color:white;

}

/* Shine hover */

button::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.6),
transparent
);

transition:0.5s;

}

button:hover::before{

left:100%;

}

button:hover{

transform:scale(1.08);

box-shadow:0 0 15px #4a90e2;

}

/* Text */

p{
margin-top:15px;
color:white;
}

a{
color:#4a90e2;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="particles">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">

<div class="medical-icon">+</div>

<h2>User Login</h2>

<div class="heartbeat">
<svg viewBox="0 0 500 100">
<polyline points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"/>
</svg>
</div>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p>New user?</p>

<a href="{{ url_for('register') }}">Register Here</a>

</div>

</body>
</html>
